<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFLundgren — App Policies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .container { width: 100%; max-width: 560px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6c757d; font-size: 0.95rem; margin-bottom: 40px; }
    .app-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .app-list li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s;
    }
    .app-list li a:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .app-name { font-weight: 600; font-size: 1rem; }
    .app-meta { font-size: 0.82rem; color: #6c757d; margin-top: 2px; }
    .arrow { color: #adb5bd; font-size: 1.1rem; }
    footer { margin-top: 48px; font-size: 0.8rem; color: #adb5bd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>App Policies</h1>
    <p class="subtitle">Privacy policies for RFLundgren apps.</p>
    <ul class="app-list">
      <li>
        <a href="caldera/">
          <div>
            <div class="app-name">Caldera</div>
            <div class="app-meta">Handpan tuning — Privacy Policy</div>
          </div>
          <span class="arrow">›</span>
        </a>
      </li>
    </ul>
    <footer>&copy; 2026 RFLundgren</footer>
  </div>
</body>
</html>
